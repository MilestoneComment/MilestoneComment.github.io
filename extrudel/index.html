<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extrudel — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e1117; --card: #1b2027; --border: #2b313b;
      --text: #e8eaed; --muted: #8b949e; --accent: #4f46e5; --radius: 16px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      max-width: 860px; width: 100%; margin: 0 auto; padding: 28px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 1.1rem; font-weight: 700; }
    nav a { font-size: 0.88rem; color: var(--muted); text-decoration: none; }
    nav a:hover { color: var(--text); }
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 56px 48px; text-align: center;
      max-width: 480px; width: 100%;
    }
    .pill {
      display: inline-block; background: #1c1a10; color: #f0b429;
      border: 1px solid #4a3f10; border-radius: 99px;
      padding: 4px 14px; font-size: 0.76rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 24px;
    }
    h1 { font-size: 2rem; font-weight: 700; color: #f4f6f8; margin-bottom: 16px; }
    p { font-size: 0.95rem; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px; border-radius: var(--radius);
      font-size: 0.92rem; font-weight: 600; text-decoration: none;
      background: #ff5e5b; color: #fff; border: 1px solid #ff7a78;
    }
    .btn:hover { background: #ff6e6b; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <span class="logo">Extrudel</span>
    <nav><a href="../">← All Tools</a></nav>
  </header>
  <main>
    <div class="card">
      <div class="pill">Coming Soon</div>
      <h1>Extrudel</h1>
      <p>This tool is in development. Check back soon — or follow along on Ko-fi for updates.</p>
      <a class="btn" href="https://ko-fi.com/jonaheaton">☕ Follow on Ko-fi</a>
    </div>
  </main>
</body>
</html>
